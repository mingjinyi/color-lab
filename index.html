<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Cyber Patina | 终极 GPU 渲染引擎 (WebGL)</title>
    <style>
        :root { --bg: #0f0f13; --panel: #18181d; --text: #d2d2d7; --accent: #ff0055; --border: #333; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        .viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
        canvas { max-width: 100%; max-height: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #222; }
        
        .controls { width: 380px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .header { padding: 20px; font-weight: 800; letter-spacing: 2px; border-bottom: 1px solid var(--border); color: #fff; display: flex; justify-content: space-between; align-items: center;}
        
        .upload-btn { background: var(--accent); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        input[type="file"] { display: none; }

        .panels { overflow-y: auto; flex: 1; padding-bottom: 50px; }
        details { border-bottom: 1px solid var(--border); }
        summary { padding: 16px 20px; cursor: pointer; font-weight: bold; list-style: none; font-size: 14px; user-select: none; }
        summary::-webkit-details-marker { display: none; }
        summary:hover { color: var(--accent); }
        details[open] summary { background: rgba(255,255,255,0.02); color: var(--accent); }
        
        .group { padding: 10px 20px 20px; background: #131317; }
        .row { margin-top: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #aaa; }
        
        input[type=range] { width: 100%; appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #333; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; margin-top: -4px; transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.5); }
        /* ==========================================
   移动端响应式适配 (Mobile Responsive)
   ========================================== */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* 改为上下排列 */
                overflow-y: auto;       /* 允许页面整体滚动 */
            }
            
            .viewport {
                width: 100%;
                height: 50vh; /* 手机上视口占上半屏 */
                padding: 10px;
                box-sizing: border-box;
            }
            
            .controls {
                width: 100%; /* 控制台占满全宽 */
                height: auto;
                border-left: none;
                border-top: 1px solid var(--border);
                flex: none; /* 取消弹性拉伸 */
            }
            
            .panels {
                padding-bottom: 30px;
            }
            
            .header {
                position: sticky; /* 让顶部标题栏在滑动时吸顶 */
                top: 0;
                z-index: 100;
                background: var(--panel);
            }
        }
    </style>
</head>
<body>

    <div class="viewport">
        <canvas id="glcanvas"></canvas>
    </div>

    <div class="controls">
        <div class="header">
            <span>CORE ENGINE v3.0</span>
            <label class="upload-btn">加载本地影像<input type="file" id="upload" accept="image/*"></label>
        </div>
        
        <div class="panels" id="ui-container">
            </div>
    </div>

    <script>
        // ==========================================
        // 1. 参数状态树 (定义所有底层控制向量)
        // ==========================================
        const state = {
            // 光影与结构
            exposure: { val: 0, min: -3, max: 3, step: 0.1, group: '光影与结构 (Light & Structure)' },
            contrast: { val: 1.0, min: 0.1, max: 3.0, step: 0.05, group: '光影与结构 (Light & Structure)' },
            clarity:  { val: 0, min: 0, max: 1, step: 0.05, group: '光影与结构 (Light & Structure)' }, // 模拟结构锐化
            // 核心色彩科学
            temperature: { val: 0, min: -1, max: 1, step: 0.05, group: '色彩科学 (Color Science)' },
            tint:        { val: 0, min: -1, max: 1, step: 0.05, group: '色彩科学 (Color Science)' },
            saturation:  { val: 1.0, min: 0, max: 3, step: 0.05, group: '色彩科学 (Color Science)' },
            hue:         { val: 0, min: -3.14, max: 3.14, step: 0.1, group: '色彩科学 (Color Science)' },
            // RGB 色调映射 (Lift-Gamma-Gain 代替曲线)
            shadows:    { val: 0, min: -1, max: 1, step: 0.05, group: '色调映射 (RGB Curves / Tone)' },
            midtones:   { val: 1, min: 0.1, max: 3, step: 0.05, group: '色调映射 (RGB Curves / Tone)' }, // Gamma 控制
            highlights: { val: 1, min: 0, max: 2, step: 0.05, group: '色调映射 (RGB Curves / Tone)' },
            // 赛博实验室 (数字退化)
            pixelate:   { val: 1, min: 1, max: 64, step: 1, group: '数字退化 (Cyber Patina Lab)' },
            aberration: { val: 0, min: 0, max: 0.05, step: 0.001, group: '数字退化 (Cyber Patina Lab)' },
            posterize:  { val: 256, min: 2, max: 256, step: 1, group: '数字退化 (Cyber Patina Lab)' },
            vignette:   { val: 0, min: 0, max: 1.5, step: 0.05, group: '数字退化 (Cyber Patina Lab)' }
        };

        // ==========================================
        // 2. 动态生成控制面板 UI
        // ==========================================
        const container = document.getElementById('ui-container');
        const groups = [...new Set(Object.values(state).map(s => s.group))];
        
        groups.forEach((groupName, index) => {
            const details = document.createElement('details');
            if (index === 0) details.open = true;
            details.innerHTML = `<summary>📂 ${groupName}</summary><div class="group" id="group-${index}"></div>`;
            container.appendChild(details);
            
            const groupDiv = document.getElementById(`group-${index}`);
            Object.keys(state).forEach(key => {
                if (state[key].group === groupName) {
                    const id = key;
                    const s = state[key];
                    groupDiv.innerHTML += `
                        <div class="row">
                            <div class="label-row"><span>${id.toUpperCase()}</span><span id="val-${id}">${s.val}</span></div>
                            <input type="range" id="${id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.val}">
                        </div>
                    `;
                }
            });
        });

        // ==========================================
        // 3. WebGL 渲染引擎 (GPU 加速核心)
        // ==========================================
        const canvas = document.getElementById('glcanvas');
        const gl = canvas.getContext('webgl');

        // 顶点着色器 (仅负责铺满屏幕)
        const vsSource = `
            attribute vec2 a_position;
            varying vec2 v_uv;
            void main() {
                v_uv = a_position * 0.5 + 0.5;
                v_uv.y = 1.0 - v_uv.y; // 翻转 Y 轴匹配图像坐标系
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        // 片段着色器 (The Hardcore Math)
        const fsSource = `
            precision highp float;
            varying vec2 v_uv;
            uniform sampler2D u_image;
            uniform vec2 u_resolution;

            // 映射 Uniforms
            uniform float u_exposure; uniform float u_contrast; uniform float u_clarity;
            uniform float u_temperature; uniform float u_tint; uniform float u_saturation; uniform float u_hue;
            uniform float u_shadows; uniform float u_midtones; uniform float u_highlights;
            uniform float u_pixelate; uniform float u_aberration; uniform float u_posterize; uniform float u_vignette;

            // RGB 转换为 HSV 函数
            vec3 rgb2hsv(vec3 c) {
                vec4 K = vec4(0.0, -1.0 / 3.0, 2.0 / 3.0, -1.0);
                vec4 p = mix(vec4(c.bg, K.wz), vec4(c.gb, K.xy), step(c.b, c.g));
                vec4 q = mix(vec4(p.xyw, c.r), vec4(c.r, p.yzx), step(p.x, c.r));
                float d = q.x - min(q.w, q.y);
                float e = 1.0e-10;
                return vec3(abs(q.z + (q.w - q.y) / (6.0 * d + e)), d / (q.x + e), q.x);
            }

            // HSV 转换为 RGB 函数
            vec3 hsv2rgb(vec3 c) {
                vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);
                vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
                return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
            }

            void main() {
                // 1. 空间退化：电子包浆 (像素化)
                vec2 uv = v_uv;
                if (u_pixelate > 1.0) {
                    float dx = u_pixelate / u_resolution.x;
                    float dy = u_pixelate / u_resolution.y;
                    uv = vec2(dx * floor(uv.x / dx), dy * floor(uv.y / dy));
                }

                // 2. 通道剥离：色散 (Aberration)
                vec4 color = texture2D(u_image, uv);
                if (u_aberration > 0.0) {
                    color.r = texture2D(u_image, uv + vec2(u_aberration, 0.0)).r;
                    color.b = texture2D(u_image, uv - vec2(u_aberration, 0.0)).b;
                }
                // ==========================================
                // NEW: 细节与结构 (Clarity / Sharpening)
                // ==========================================
                if (u_clarity > 0.0) {
                    // 获取单个像素的步长
                    vec2 step = 1.0 / u_resolution;
                    
                    // 采样上下左右四个邻居像素
                    vec3 col_up = texture2D(u_image, uv + vec2(0.0, step.y)).rgb;
                    vec3 col_dn = texture2D(u_image, uv + vec2(0.0, -step.y)).rgb;
                    vec3 col_lf = texture2D(u_image, uv + vec2(-step.x, 0.0)).rgb;
                    vec3 col_rt = texture2D(u_image, uv + vec2(step.x, 0.0)).rgb;
                    
                    // 提取高频细节 (当前像素 * 4 - 四周像素之和)
                    vec3 highFreq = color.rgb * 4.0 - (col_up + col_dn + col_lf + col_rt);
                    
                    // 将高频边缘以 u_clarity 为权重重新叠加回原图，实现局部微反差增强
                    color.rgb += highFreq * u_clarity * 2.5; 
                }
                
                // 3. 基础光影映射
                color.rgb *= pow(2.0, u_exposure);
                color.rgb = (color.rgb - 0.5) * u_contrast + 0.5;

                // 4. 色温与色调 (物理级校准映射)
                color.r += u_temperature * 0.2; color.b -= u_temperature * 0.2; // Temp
                color.g += u_tint * 0.2; // Tint

                // 5. HSV 色彩空间变换 (饱和度与色相)
                vec3 hsv = rgb2hsv(color.rgb);
                hsv.y *= u_saturation; // 饱和度
                hsv.x = mod(hsv.x + u_hue / 6.28318, 1.0); // 色相环旋转
                color.rgb = hsv2rgb(hsv);

                // 6. RGB 曲线等效映射 (Lift, Gamma, Gain)
                // Shadows(Lift), Midtones(Gamma), Highlights(Gain)
                color.rgb = color.rgb * u_highlights; // 增益
                color.rgb = pow(clamp(color.rgb, 0.0, 1.0), vec3(1.0 / u_midtones)); // 伽马
                color.rgb = color.rgb + u_shadows * (1.0 - color.rgb); // 提升暗部

                // 7. 色彩退化：海报化 / 色阶断层
                if (u_posterize < 256.0) {
                    color.rgb = floor(color.rgb * u_posterize) / u_posterize;
                }

                // 8. 暗角特效 (Vignette)
                float dist = distance(v_uv, vec2(0.5, 0.5));
                color.rgb *= smoothstep(0.8, 0.8 - u_vignette, dist);

                gl_FragColor = vec4(clamp(color.rgb, 0.0, 1.0), 1.0);
            }
        `;

        // 编译着色器工具
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(program);
        gl.useProgram(program);

        // 设置全屏矩形几何体
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const positionLocation = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // 创建纹理容器
        const texture = gl.createTexture();
        let sourceImage = new Image();

        // 绑定 UI 事件
        Object.keys(state).forEach(key => {
            const slider = document.getElementById(key);
            const valDisplay = document.getElementById(`val-${key}`);
            slider.addEventListener('input', (e) => {
                state[key].val = parseFloat(e.target.value);
                valDisplay.innerText = state[key].val;
                requestAnimationFrame(render); // 零延迟触发重绘
            });
        });

        // 核心渲染循环 (将 CPU 状态向量传入 GPU 着色器)
        function render() {
            gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
            gl.uniform2f(gl.getUniformLocation(program, 'u_resolution'), gl.canvas.width, gl.canvas.height);
            
            Object.keys(state).forEach(key => {
                gl.uniform1f(gl.getUniformLocation(program, `u_${key}`), state[key].val);
            });

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        }

        // 加载并初始化测试图案
        function initImage(src) {
            sourceImage.onload = () => {
                canvas.width = sourceImage.width;
                canvas.height = sourceImage.height;
                gl.bindTexture(gl.TEXTURE_2D, texture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, sourceImage);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
                render();
            };
            sourceImage.src = src;
        }

        // 本地上传图片逻辑
        document.getElementById('upload').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => initImage(event.target.result);
            if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        // 启动！(使用 Base64 默认生成一张测试信号图)
        const defaultCanvas = document.createElement('canvas');
        defaultCanvas.width = 1024; defaultCanvas.height = 1024;
        const dCtx = defaultCanvas.getContext('2d');
        const grd = dCtx.createLinearGradient(0,0,1024,1024);
        grd.addColorStop(0,"#ff0055"); grd.addColorStop(1,"#00ffcc");
        dCtx.fillStyle = grd; dCtx.fillRect(0,0,1024,1024);
        dCtx.fillStyle = '#fff'; dCtx.font = 'bold 120px sans-serif';
        dCtx.fillText('CYBER', 300, 450); dCtx.fillText('ENGINE', 280, 600);
        
        initImage(defaultCanvas.toDataURL());

    </script>
</body>
</html>
