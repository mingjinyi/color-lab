<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Cyber Patina | 终极 GPU 渲染引擎 (WebGL)</title>
    <style>
        :root { --bg: #0f0f13; --panel: #18181d; --text: #d2d2d7; --accent: #ff0055; --border: #333; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }
        
        .viewport { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
        canvas { max-width: 100%; max-height: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #222; }
        
        .controls { 
            width: 460px; /* ✨ 将原来的 380px 拓宽到 460px 左右 */
            background: var(--panel); 
            border-left: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
        }

        .header { 
            padding: 15px 20px; /* 稍微调整上下边距让整体更协调 */
            font-weight: 800; 
            letter-spacing: 2px; 
            border-bottom: 1px solid var(--border); 
            color: #fff; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            flex-wrap: wrap; /* ✨ 核心防御：允许内部元素自动换行，绝不出框 */
            gap: 12px; /* 换行时的间距 */
        }
        
        /* ✨ 新增：让装按钮的容器也用 flex 布局，方便统一管理间距 */
        .header > div {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .upload-btn { background: var(--accent); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        input[type="file"] { display: none; }

        .panels { overflow-y: auto; flex: 1; padding-bottom: 50px; }
        details { border-bottom: 1px solid var(--border); }
        summary { padding: 16px 20px; cursor: pointer; font-weight: bold; list-style: none; font-size: 14px; user-select: none; }
        summary::-webkit-details-marker { display: none; }
        summary:hover { color: var(--accent); }
        details[open] summary { background: rgba(255,255,255,0.02); color: var(--accent); }
        
        .group { padding: 10px 20px 20px; background: #131317; }
        .row { margin-top: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #aaa; }
        
        input[type=range] { width: 100%; appearance: none; background: transparent; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #333; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; margin-top: -4px; transition: transform 0.1s; }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.5); }
        /* ==========================================
   移动端响应式适配 (Mobile Responsive)
   ========================================== */
        @media (max-width: 768px) {
            body {
                flex-direction: column; /* 改为上下排列 */
                overflow-y: auto;       /* 允许页面整体滚动 */
            }
            
            .viewport {
                width: 100%;
                height: 50vh; /* 手机上视口占上半屏 */
                padding: 10px;
                box-sizing: border-box;
            }
            
            .controls {
                width: 100%; /* 控制台占满全宽 */
                height: auto;
                border-left: none;
                border-top: 1px solid var(--border);
                flex: none; /* 取消弹性拉伸 */
            }
            
            .panels {
                padding-bottom: 30px;
            }
            
            .header {
                position: sticky; /* 让顶部标题栏在滑动时吸顶 */
                top: 0;
                z-index: 100;
                background: var(--panel);
            }
        }
    </style>
</head>
<body>

    <div class="viewport">
        <canvas id="glcanvas"></canvas>
    </div>

    <div class="controls">
        <div class="header">
            <span>CORE ENGINE v3.0</span>
            <div>
                <button id="cam-btn" class="upload-btn" style="background: #8a2be2; border: none; margin-right: 5px;">📷 实时相机</button>
                <button id="flip-cam-btn" class="upload-btn" style="background: #ffaa00; border: none; margin-right: 5px; display: none;">🔄 切换镜头</button>
                <label class="upload-btn">加载影像<input type="file" id="upload" accept="image/*"></label>
                <button id="share-btn" class="upload-btn" style="background: #333; color: #fff; border: 1px solid #555; margin-left: 5px;">🔗 复制预设</button>
                <button id="download-btn" class="upload-btn" style="margin-left: 5px; background: #00ffcc; color: #000; border: none;">💾 保存</button>
            </div>
        </div>
        
        <div class="panels" id="ui-container">
            </div>
    </div>

    <script>
        // ==========================================
        // 1. 参数状态树 (定义所有底层控制向量)
        // ==========================================
        const state = {
            // 光影与结构
            exposure: { val: 0, min: -3, max: 3, step: 0.1, group: '光影与结构 (Light & Structure)' },
            contrast: { val: 1.0, min: 0.1, max: 3.0, step: 0.05, group: '光影与结构 (Light & Structure)' },
            clarity:  { val: 0, min: 0, max: 1, step: 0.05, group: '光影与结构 (Light & Structure)' }, // 模拟结构锐化
            // 核心色彩科学
            temperature: { val: 0, min: -1, max: 1, step: 0.05, group: '色彩科学 (Color Science)' },
            tint:        { val: 0, min: -1, max: 1, step: 0.05, group: '色彩科学 (Color Science)' },
            saturation:  { val: 1.0, min: 0, max: 3, step: 0.05, group: '色彩科学 (Color Science)' },
            hue:         { val: 0, min: -3.14, max: 3.14, step: 0.1, group: '色彩科学 (Color Science)' },
            // RGB 色调映射 (Lift-Gamma-Gain 代替曲线)
            shadows:    { val: 0, min: -1, max: 1, step: 0.05, group: '色调映射 (RGB Curves / Tone)' },
            midtones:   { val: 1, min: 0.1, max: 3, step: 0.05, group: '色调映射 (RGB Curves / Tone)' }, // Gamma 控制
            highlights: { val: 1, min: 0, max: 2, step: 0.05, group: '色调映射 (RGB Curves / Tone)' },
            // 赛博实验室 (数字退化)
            pixelate:   { val: 1, min: 1, max: 64, step: 1, group: '数字退化 (Cyber Patina Lab)' },
            aberration: { val: 0, min: 0, max: 0.05, step: 0.001, group: '数字退化 (Cyber Patina Lab)' },
            posterize:  { val: 256, min: 2, max: 256, step: 1, group: '数字退化 (Cyber Patina Lab)' },
            vignette:   { val: 0, min: 0, max: 1.5, step: 0.05, group: '数字退化 (Cyber Patina Lab)' },
            scanline:   { val: 0, min: 0, max: 1, step: 0.05, group: '动态故障 (Dynamic Glitch)' },
            glitch:     { val: 0, min: 0, max: 1, step: 0.05, group: '动态故障 (Dynamic Glitch)' }
            
        };

        // ==========================================
        // 2. 动态生成控制面板 UI
        // ==========================================
        const container = document.getElementById('ui-container');
        const groups = [...new Set(Object.values(state).map(s => s.group))];
        
        groups.forEach((groupName, index) => {
            const details = document.createElement('details');
            if (index === 0) details.open = true;
            details.innerHTML = `<summary>📂 ${groupName}</summary><div class="group" id="group-${index}"></div>`;
            container.appendChild(details);
            
            const groupDiv = document.getElementById(`group-${index}`);
            Object.keys(state).forEach(key => {
                if (state[key].group === groupName) {
                    const id = key;
                    const s = state[key];
                    groupDiv.innerHTML += `
                        <div class="row">
                            <div class="label-row"><span>${id.toUpperCase()}</span><span id="val-${id}">${s.val}</span></div>
                            <input type="range" id="${id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.val}">
                        </div>
                    `;
                }
            });
        });

        // ==========================================
        // 3. WebGL 渲染引擎 (GPU 加速核心)
        // ==========================================
        const canvas = document.getElementById('glcanvas');
        const gl = canvas.getContext('webgl');

        // 顶点着色器 (仅负责铺满屏幕)
        const vsSource = `
            attribute vec2 a_position;
            varying vec2 v_uv;
            void main() {
                v_uv = a_position * 0.5 + 0.5;
                v_uv.y = 1.0 - v_uv.y; // 翻转 Y 轴匹配图像坐标系
                gl_Position = vec4(a_position, 0.0, 1.0);
            }
        `;

        // 片段着色器 (The Hardcore Math)
        const fsSource = `
            precision highp float;
            varying vec2 v_uv;
            uniform sampler2D u_image;
            uniform vec2 u_resolution;
            uniform float u_time; // ✨ 新增：时间维度

            // 映射 Uniforms (包含新增的 glitch 和 scanline)
            uniform float u_exposure; uniform float u_contrast; uniform float u_clarity;
            uniform float u_temperature; uniform float u_tint; uniform float u_saturation; uniform float u_hue;
            uniform float u_shadows; uniform float u_midtones; uniform float u_highlights;
            uniform float u_pixelate; uniform float u_aberration; uniform float u_posterize; uniform float u_vignette;
            uniform float u_scanline; uniform float u_glitch;

            // RGB <-> HSV 函数 (保持不变)
            vec3 rgb2hsv(vec3 c) { vec4 K=vec4(0.0,-1.0/3.0,2.0/3.0,-1.0); vec4 p=mix(vec4(c.bg,K.wz),vec4(c.gb,K.xy),step(c.b,c.g)); vec4 q=mix(vec4(p.xyw,c.r),vec4(c.r,p.yzx),step(p.x,c.r)); float d=q.x-min(q.w,q.y); float e=1.0e-10; return vec3(abs(q.z+(q.w-q.y)/(6.0*d+e)),d/(q.x+e),q.x); }
            vec3 hsv2rgb(vec3 c) { vec4 K=vec4(1.0,2.0/3.0,1.0/3.0,3.0); vec3 p=abs(fract(c.xxx+K.xyz)*6.0-K.www); return c.z*mix(K.xxx,clamp(p-K.xxx,0.0,1.0),c.y); }

            // 简单的伪随机噪声发生器
            float rand(vec2 co){ return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }

            void main() {
                vec2 uv = v_uv;
                
                // 1. 空间退化：电子包浆
                if (u_pixelate > 1.0) {
                    float dx = u_pixelate / u_resolution.x;
                    float dy = u_pixelate / u_resolution.y;
                    uv = vec2(dx * floor(uv.x / dx), dy * floor(uv.y / dy));
                }

                // ✨ 2. 动态通道剥离：色散 + Glitch 抖动
                vec4 color = texture2D(u_image, uv);
                if (u_aberration > 0.0 || u_glitch > 0.0) {
                    // 利用时间产生随机的横向撕裂偏移
                    float noise = rand(vec2(uv.y, u_time)) * 2.0 - 1.0; 
                    // 当 glitch 参数增大时，高频噪声撕裂感增强
                    float offset = u_aberration + (u_glitch * noise * 0.08); 
                    
                    color.r = texture2D(u_image, uv + vec2(offset, 0.0)).r;
                    color.b = texture2D(u_image, uv - vec2(offset, 0.0)).b;
                }

                // (保留你原有的 Clarity 逻辑)
                if (u_clarity > 0.0) {
                    vec2 step = 1.0 / u_resolution;
                    vec3 col_up = texture2D(u_image, uv + vec2(0.0, step.y)).rgb;
                    vec3 col_dn = texture2D(u_image, uv + vec2(0.0, -step.y)).rgb;
                    vec3 col_lf = texture2D(u_image, uv + vec2(-step.x, 0.0)).rgb;
                    vec3 col_rt = texture2D(u_image, uv + vec2(step.x, 0.0)).rgb;
                    vec3 highFreq = color.rgb * 4.0 - (col_up + col_dn + col_lf + col_rt);
                    color.rgb += highFreq * u_clarity * 2.5; 
                }
                
                color.rgb *= pow(2.0, u_exposure);
                color.rgb = (color.rgb - 0.5) * u_contrast + 0.5;
                color.r += u_temperature * 0.2; color.b -= u_temperature * 0.2; 
                color.g += u_tint * 0.2; 

                vec3 hsv = rgb2hsv(color.rgb);
                hsv.y *= u_saturation; 
                hsv.x = mod(hsv.x + u_hue / 6.28318, 1.0); 
                color.rgb = hsv2rgb(hsv);

                color.rgb = color.rgb * u_highlights; 
                color.rgb = pow(clamp(color.rgb, 0.0, 1.0), vec3(1.0 / u_midtones)); 
                color.rgb = color.rgb + u_shadows * (1.0 - color.rgb); 

                if (u_posterize < 256.0) { color.rgb = floor(color.rgb * u_posterize) / u_posterize; }

                // ✨ 3. CRT 扫描线 (Scanlines)
                if (u_scanline > 0.0) {
                    // 利用 uv.y 和 u_time 制造向下滚动的扫描线
                    float scan = sin(uv.y * 800.0 - u_time * 10.0) * 0.04 * u_scanline;
                    color.rgb -= scan;
                }

                float dist = distance(v_uv, vec2(0.5, 0.5));
                color.rgb *= smoothstep(0.8, 0.8 - u_vignette, dist);

                gl_FragColor = vec4(clamp(color.rgb, 0.0, 1.0), 1.0);
            }
        `;

        // 编译着色器工具
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader error:', gl.getShaderInfoLog(shader));
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
        gl.linkProgram(program);
        gl.useProgram(program);

        // 设置全屏矩形几何体
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const positionLocation = gl.getAttribLocation(program, 'a_position');
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation, 2, gl.FLOAT, false, 0, 0);

        // 创建纹理容器
        const texture = gl.createTexture();
        let sourceImage = new Image();

        // 绑定 UI 事件
        Object.keys(state).forEach(key => {
            const slider = document.getElementById(key);
            const valDisplay = document.getElementById(`val-${key}`);
            slider.addEventListener('input', (e) => {
                state[key].val = parseFloat(e.target.value);
                valDisplay.innerText = state[key].val;
                requestAnimationFrame(render); // 零延迟触发重绘
            });
        });

        // 核心渲染循环 (将 CPU 状态向量传入 GPU 着色器)
        // ==========================================
        // 核心渲染循环系统
        // ==========================================
        let startTime = Date.now();
        let videoElement = null; // 用于存放摄像头流
        // 在 let startTime = Date.now(); 和 let videoElement = null; 附近添加：
        let isUsingCamera = false;
        let currentFacingMode = 'environment'; // 默认使用后置摄像头
        // 修改 render 函数
        function render() {
            gl.viewport(0, 0, gl.canvas.width, gl.canvas.height);
            gl.uniform2f(gl.getUniformLocation(program, 'u_resolution'), gl.canvas.width, gl.canvas.height);
            
            // ✨ 注入时间参数
            let currentTime = (Date.now() - startTime) / 1000.0;
            gl.uniform1f(gl.getUniformLocation(program, 'u_time'), currentTime);
            
            // ✨ 视频流实时纹理更新
           if (isUsingCamera && videoElement && videoElement.readyState >= videoElement.HAVE_CURRENT_DATA) {
                gl.bindTexture(gl.TEXTURE_2D, texture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, videoElement);
            }

            Object.keys(state).forEach(key => {
                gl.uniform1f(gl.getUniformLocation(program, `u_${key}`), state[key].val);
            });

            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            
            // 永不停息的循环，用于驱动动画
            requestAnimationFrame(render);
        }

        // 修改 slider 监听，去除原有的 requestAnimationFrame(render)
        Object.keys(state).forEach(key => {
            const slider = document.getElementById(key);
            const valDisplay = document.getElementById(`val-${key}`);
            slider.addEventListener('input', (e) => {
                state[key].val = parseFloat(e.target.value);
                valDisplay.innerText = state[key].val;
            });
        });

        // 启动渲染循环
        render();

        // ==========================================
        // 实时摄像头接入逻辑 (支持前后摄切换)
        // ==========================================
        async function startCamera(facingMode) {
            if (!videoElement) {
                videoElement = document.createElement('video');
                videoElement.autoplay = true;
                videoElement.muted = true;
                videoElement.playsInline = true;
            }

            // 核心：如果当前摄像头正在运行，必须先释放硬件轨道，否则切换会失败或报错
            if (videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop());
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: facingMode, 
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    } 
                });
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    // 调整 canvas 尺寸匹配视频流
                    canvas.width = videoElement.videoWidth;
                    canvas.height = videoElement.videoHeight;
                };
                
                isUsingCamera = true;
                document.getElementById('flip-cam-btn').style.display = 'inline-block'; // 显示切换按钮
            } catch (err) {
                alert('无法访问摄像头，请检查浏览器权限！');
            }
        }
        document.getElementById('cam-btn').addEventListener('click', () => {
            startCamera(currentFacingMode);
        });

        document.getElementById('flip-cam-btn').addEventListener('click', () => {
            // 翻转状态并重启相机
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
            startCamera(currentFacingMode);
        });
        // ==========================================
        // 预设分享与 URL 读取逻辑 (MVP 闭环)
        // ==========================================
        // 1. 生成分享链接
        document.getElementById('share-btn').addEventListener('click', () => {
            const preset = {};
            Object.keys(state).forEach(k => preset[k] = state[k].val);
            // 极简的 Base64 序列化
            const encoded = btoa(JSON.stringify(preset));
            const shareUrl = window.location.origin + window.location.pathname + '?p=' + encoded;
            
            // 写入剪贴板
            navigator.clipboard.writeText(shareUrl).then(() => {
                const btn = document.getElementById('share-btn');
                btn.innerText = '✅ 已复制';
                setTimeout(() => btn.innerText = '🔗 复制预设', 2000);
            });
        });

        // 2. 页面加载时解析 URL 参数
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const p = urlParams.get('p');
            if (p) {
                try {
                    const preset = JSON.parse(atob(p));
                    Object.keys(preset).forEach(k => {
                        if(state[k]) {
                            state[k].val = preset[k];
                            // 同步更新 UI
                            const slider = document.getElementById(k);
                            if(slider) {
                                slider.value = preset[k];
                                document.getElementById(`val-${k}`).innerText = preset[k];
                            }
                        }
                    });
                } catch(e) {
                    console.error('预设解析失败');
                }
            }
        });

        // 加载并初始化测试图案
        function initImage(src) {
            sourceImage.onload = () => {
                canvas.width = sourceImage.width;
                canvas.height = sourceImage.height;
                gl.bindTexture(gl.TEXTURE_2D, texture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, sourceImage);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
                render();
            };
            sourceImage.src = src;
        }

        // ==========================================
        // 本地上传图片逻辑 (修复冲突)
        // ==========================================
        document.getElementById('upload').addEventListener('change', (e) => {
            // ✨ 核心修复：上传本地图时，关闭相机状态并释放硬件轨道
            isUsingCamera = false;
            document.getElementById('flip-cam-btn').style.display = 'none'; // 隐藏切换按钮
            
            if (videoElement && videoElement.srcObject) {
                videoElement.srcObject.getTracks().forEach(track => track.stop());
                videoElement.srcObject = null;
            }

            const reader = new FileReader();
            reader.onload = (event) => initImage(event.target.result);
            if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        // 启动！(使用 Base64 默认生成一张测试信号图)
        const defaultCanvas = document.createElement('canvas');
        defaultCanvas.width = 1024; defaultCanvas.height = 1024;
        const dCtx = defaultCanvas.getContext('2d');
        const grd = dCtx.createLinearGradient(0,0,1024,1024);
        grd.addColorStop(0,"#ff0055"); grd.addColorStop(1,"#00ffcc");
        dCtx.fillStyle = grd; dCtx.fillRect(0,0,1024,1024);
        dCtx.fillStyle = '#fff'; dCtx.font = 'bold 120px sans-serif';
        dCtx.fillText('CYBER', 300, 450); dCtx.fillText('ENGINE', 280, 600);
        
        initImage(defaultCanvas.toDataURL());
        // ==========================================
        // 4. 高清原图无损导出逻辑
        // ==========================================
        document.getElementById('download-btn').addEventListener('click', () => {
            if (!sourceImage.src) return;

            // 关键点 1：强制触发一次同步重绘。
            // 因为 WebGL 默认会在每一帧渲染完毕后清空绘制缓冲区 (Drawing Buffer) 以节省内存。
            // 如果不先 render() 一次，你截取出来的可能是一张全黑的图。
            render();

            // 关键点 2：使用 toBlob 异步导出大图，防止 toDataURL 产生的超长 Base64 字符串卡死手机浏览器。
            canvas.toBlob((blob) => {
                if (!blob) {
                    alert('导出失败，请重试');
                    return;
                }
                
                // 创建一个虚拟的下载链接
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                
                // 生成带时间戳的文件名，默认保存为 PNG 无损格式
                const timestamp = new Date().getTime();
                a.download = `Cyber_Patina_${timestamp}.png`; 
                
                document.body.appendChild(a);
                a.click(); // 触发静默下载

                // 释放内存
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 100);
                
            }, 'image/png'); // 你也可以改为 'image/jpeg', 0.95 来输出体积更小的 JPG
        });

    </script>
</body>
</html>
